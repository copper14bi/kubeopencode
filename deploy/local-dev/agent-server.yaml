# Agent for local testing with persistence
#
# This Agent runs a persistent OpenCode server (Deployment + Service).
# Tasks connect to the server via --attach flag for faster execution.
#
# Features demonstrated:
#   - templateRef: inherits shared config from AgentTemplate
#   - persistence: session + workspace data survive pod restarts
#   - suspend: can be suspended/resumed to save compute resources
#
apiVersion: kubeopencode.io/v1alpha1
kind: Agent
metadata:
  name: server-agent
spec:
  # Inherit shared configuration from AgentTemplate
  templateRef:
    name: local-dev-base
  profile: "Persistent agent for local development and testing"
  # Required fields (also in template, but required on Agent)
  executorImage: quay.io/kubeopencode/kubeopencode-agent-devbox:latest
  workspaceDir: /workspace
  serviceAccountName: kubeopencode-agent
  # Server port (default: 4096)
  port: 4096
  # Session persistence: conversation history survives pod restarts
  persistence:
    sessions:
      size: "1Gi"
    # Workspace persistence: git repos and modified files survive pod restarts
    workspace:
      size: "5Gi"
  # Limit concurrent tasks for local testing
  maxConcurrentTasks: 3
  # Mount OpenCode API credentials (overrides template to demonstrate override)
  credentials:
    - name: opencode
      secretRef:
        name: opencode-credentials
